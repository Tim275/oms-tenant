# Patch Payments deployment to use production secrets for RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: oms
spec:
  template:
    spec:
      containers:
      - name: payments
        env:
        # Override RabbitMQ credentials from secret
        - name: AMQP_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_USER

        - name: AMQP_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_PASSWORD

        # Override RabbitMQ URL from secret (complete connection string)
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_URL

        # Note: STRIPE_SECRET_KEY and STRIPE_ENDPOINT_SECRET already use secretKeyRef
        # from base deployment (stripe-secrets)
