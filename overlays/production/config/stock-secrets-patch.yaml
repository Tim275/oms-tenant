# Patch Stock deployment to use production secrets for database/redis/rabbitmq
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock
  namespace: oms
spec:
  template:
    spec:
      containers:
      - name: stock
        env:
        # Override PostgreSQL password from secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: POSTGRES_PASSWORD

        # Override RabbitMQ credentials from secret
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_USER

        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_PASSWORD

        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_URL

        # Override Redis password from secret
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: REDIS_PASSWORD

        # Build complete PostgreSQL URI with secret password
        - name: POSTGRES_URI
          value: "postgresql://stock:$(POSTGRES_PASSWORD)@postgresql.database.svc.cluster.local:5432/stock?sslmode=require"
