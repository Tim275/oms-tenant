# Production Secrets for OMS
# ⚠️ IMPORTANT: This file contains sensitive production secrets
# ⚠️ DO NOT COMMIT THIS FILE TO GIT UNENCRYPTED!
#
# Security Options:
# 1. Encrypt with SOPS: sops --encrypt secrets.yaml > secrets.enc.yaml
# 2. Use SealedSecrets: kubeseal --format=yaml < secrets.yaml > sealed-secrets.yaml
# 3. Use External Secrets Operator (AWS/GCP/Azure Secret Manager)
# 4. Store in Vault and sync with Vault Agent

---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-secrets
  namespace: oms
  labels:
    app.kubernetes.io/name: stripe-secrets
    app.kubernetes.io/part-of: oms
    environment: production
type: Opaque
stringData:
  # Stripe Production API Key
  # TODO: Replace with actual production key from https://dashboard.stripe.com/apikeys
  STRIPE_SECRET_KEY: "sk_live_CHANGEME_PRODUCTION_KEY_REQUIRED"

  # Stripe Production Webhook Secret
  # TODO: Create webhook at https://dashboard.stripe.com/webhooks
  # Endpoint URL: https://api.oms.timourhomelab.org/webhook/stripe
  # Events to select: checkout.session.completed
  STRIPE_ENDPOINT_SECRET: "whsec_CHANGEME_WEBHOOK_SECRET_REQUIRED"

---
apiVersion: v1
kind: Secret
metadata:
  name: database-secrets
  namespace: oms
  labels:
    app.kubernetes.io/name: database-secrets
    app.kubernetes.io/part-of: oms
    environment: production
type: Opaque
stringData:
  # PostgreSQL Production Password
  # Generate: openssl rand -base64 32
  # TODO: Update with actual production password
  POSTGRES_PASSWORD: "CHANGEME_USE_STRONG_PASSWORD"

  # MongoDB Production Password
  # TODO: Update with actual MongoDB Atlas password or managed instance
  MONGODB_PASSWORD: "CHANGEME_USE_STRONG_PASSWORD"

  # Complete MongoDB Connection String
  # TODO: Replace with actual Atlas connection string or managed MongoDB URI
  # Example: mongodb+srv://oms-prod:PASSWORD@cluster0.xxxxx.mongodb.net/orders?retryWrites=true&w=majority
  MONGODB_URI: "mongodb://CHANGEME_USER:CHANGEME_PASS@mongodb.database.svc.cluster.local:27017/orders?authSource=admin"

---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secrets
  namespace: oms
  labels:
    app.kubernetes.io/name: rabbitmq-secrets
    app.kubernetes.io/part-of: oms
    environment: production
type: Opaque
stringData:
  # RabbitMQ Production Credentials
  # TODO: Replace with production user (NOT 'guest'!)
  RABBITMQ_USER: "oms-production"

  # RabbitMQ Production Password
  # Generate: openssl rand -base64 32
  RABBITMQ_PASSWORD: "CHANGEME_USE_STRONG_PASSWORD"

  # Complete RabbitMQ Connection URL
  # TODO: Update with managed RabbitMQ endpoint (CloudAMQP, AWS MQ, etc.)
  # Use TLS in production: amqps://
  RABBITMQ_URL: "amqps://CHANGEME_USER:CHANGEME_PASS@rabbitmq.messaging.svc.cluster.local:5671/"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: oms
  labels:
    app.kubernetes.io/name: redis-secrets
    app.kubernetes.io/part-of: oms
    environment: production
type: Opaque
stringData:
  # Redis Production Password
  # TODO: Update with ElastiCache or Redis Cloud password
  REDIS_PASSWORD: "CHANGEME_USE_STRONG_PASSWORD"

  # Redis Connection URL (with auth)
  # TODO: Replace with managed Redis endpoint
  REDIS_URL: "redis://:CHANGEME_PASSWORD@redis.cache.svc.cluster.local:6379/0"
