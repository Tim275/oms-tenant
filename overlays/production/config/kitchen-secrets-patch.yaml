# Patch Kitchen deployment to use production secrets for RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen
  namespace: oms
spec:
  template:
    spec:
      containers:
      - name: kitchen
        env:
        # Override RabbitMQ connection from secret
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_URL

        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_USER

        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_PASSWORD
