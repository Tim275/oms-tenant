# Patch Orders deployment to use production secrets for MongoDB and RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: oms
spec:
  template:
    spec:
      containers:
      - name: orders
        env:
        # Override MongoDB URI from secret (complete connection string)
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: MONGODB_URI

        # Override RabbitMQ connection from secret
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_URL

        # RabbitMQ user from secret
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_USER

        # RabbitMQ password from secret
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_PASSWORD
