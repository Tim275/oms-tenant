# Security Context Patch for Pod Security Standard: Restricted
# Uses JSON patch to add security context to first container without knowing its name
# This avoids the strategic merge patch issue where `name: placeholder` creates a new container

apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
spec:
  template:
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
