apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oms

resources:
# Namespace
- namespace.yaml

# Shared Configuration
- configmap.yaml

# Secrets (Sealed Secrets)
- secrets/

# Services
- gateway/
- orders/
- payments/
- stock/
- kitchen/
- customer-app/
- kitchen-display/

# Ingress/Gateway
- ingress/

# Monitoring & Autoscaling
- monitoring/

commonLabels:
  app.kubernetes.io/part-of: oms
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
