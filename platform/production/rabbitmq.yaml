# =============================================================================
# 🐰 RabbitMQ Cluster - Enterprise Best Practice
# =============================================================================
# Uses static credentials secret for predictable authentication
# Services reference these credentials via ConfigMap
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: oms
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/component: messaging
    platform.homelab/tenant: oms
type: Opaque
stringData:
  username: guest
  password: guest
---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: oms
  labels:
    app: rabbitmq
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/component: messaging
    platform.homelab/tenant: oms
spec:
  replicas: 1
  image: rabbitmq:4.2-management-alpine

  service:
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    storageClassName: rook-ceph-block-enterprise
    storage: 2Gi

  rabbitmq:
    additionalPlugins:
      - rabbitmq_management
      - rabbitmq_prometheus
    additionalConfig: |
      cluster_partition_handling = pause_minority
      vm_memory_high_watermark.relative = 0.6
      disk_free_limit.absolute = 2GB
      # Use static guest credentials
      default_user = guest
      default_pass = guest
      default_vhost = /
      # Allow guest loopback only (secure for internal cluster use)
      loopback_users.guest = false

  override:
    statefulSet:
      spec:
        template:
          metadata:
            labels:
              app: rabbitmq
              platform.homelab/tenant: oms
